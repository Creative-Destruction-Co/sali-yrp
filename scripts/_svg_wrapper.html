<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;background:transparent;}
  object{display:block;}
</style></head>
<body><object id="svg-host" type="image/svg+xml"></object>
<script>
  const params = new URLSearchParams(location.search);
  const src = params.get('svg');
  document.getElementById('svg-host').setAttribute('data', src);
</script>
</body></html>
